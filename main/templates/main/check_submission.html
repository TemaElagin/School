{% extends "base.html" %}
{% block title %}Проверка: {{ submission.student.username }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto space-y-6">
    <h1 class="text-2xl font-bold">Проверка решения</h1>
    <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl border border-slate-200 dark:border-slate-700">
        <p><strong>Ученик:</strong> {{ submission.student.username }}</p>
        <p><strong>Урок:</strong> {{ submission.lesson.title }}</p>
        <a href="{{ submission.file.url }}" target="_blank" class="inline-block mt-4 text-brand-600 font-bold underline">Открыть решение студента</a>
    </div>

    <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl border border-slate-200 dark:border-slate-700 django-form-wrapper">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="w-full mt-4 py-3 bg-emerald-600 text-white font-bold rounded-xl hover:bg-emerald-700">Сохранить проверку</button>
        </form>
    </div>
</div>
{% endblock %}
