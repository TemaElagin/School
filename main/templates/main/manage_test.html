{% extends "base.html" %}

{% block title %}Управление тестом — MySchool{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <h1 class="text-2xl font-bold text-slate-900 dark:text-white mb-6">Вопросы теста: {{ lesson.title }}</h1>
    
    <form method="post" class="space-y-6">
        {% csrf_token %}
        {{ formset.management_form }}
        
        <div id="questions-container" class="space-y-4">
            {% for form in formset %}
                <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm">
                    {{ form.as_p }}
                </div>
            {% endfor %}
        </div>

        <button type="submit" class="w-full py-3 bg-emerald-600 text-white font-bold rounded-xl hover:bg-emerald-700 transition-all">
            Сохранить все изменения
        </button>
    </form>
</div>
{% endblock %}
