{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-10">
    <h2 class="text-2xl font-bold mb-6 text-center">Вход в систему</h2>
    <div class="bg-white dark:bg-slate-800 p-8 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm django-form-wrapper">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="w-full mt-4 py-3 bg-brand-600 text-white font-bold rounded-xl hover:bg-brand-700">Войти</button>
        </form>
    </div>
</div>
{% endblock %}
