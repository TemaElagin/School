{% extends "base.html" %}
{% block title %}Редактирование: {{ lesson.title }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <a href="{% url 'lesson_detail' lesson.id %}" class="text-slate-500 hover:text-slate-900 dark:hover:text-white transition-colors">← Отмена</a>
    <h1 class="text-2xl font-bold mt-4 mb-6">Редактирование урока: "{{ lesson.title }}"</h1>
    <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl border border-slate-200 dark:border-slate-700 django-form-wrapper">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="w-full mt-4 py-3 bg-emerald-600 text-white font-bold rounded-xl hover:bg-emerald-700">Сохранить изменения</button>
        </form>
    </div>
</div>
{% endblock %}
